name: CI/CD

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}/backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/frontend

jobs:
  backend-build:
    name: Backend verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify backend
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/target/surefire-reports
            backend/target/site/jacoco
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/app.jar
          retention-days: 7

  frontend-build:
    name: Frontend verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage -- --run

      - name: Build
        run: npm run build

      - name: Upload frontend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-artifacts
          path: |
            frontend/dist
            frontend/coverage
          if-no-files-found: ignore
          retention-days: 14

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [java-kotlin, javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  docker-build:
    name: Build and publish images
    if: github.event_name == 'push'
    needs: [backend-build, frontend-build, codeql]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      backend-image: ${{ steps.images.outputs.backend }}
      frontend-image: ${{ steps.images.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - name: Define immutable image names
        id: images
        run: |
          echo "backend=${REGISTRY}/${IMAGE_NAME_BACKEND}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend=${REGISTRY}/${IMAGE_NAME_FRONTEND}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.images.outputs.backend }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          provenance: mode=max
          sbom: true

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: ${{ steps.images.outputs.frontend }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          provenance: mode=max
          sbom: true

  container-scan:
    name: Scan published images
    if: github.event_name == 'push'
    needs: [docker-build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      matrix:
        image: [backend, frontend]
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image
        id: resolve
        env:
          BACKEND_IMAGE: ${{ needs.docker-build.outputs.backend-image }}
          FRONTEND_IMAGE: ${{ needs.docker-build.outputs.frontend-image }}
        run: |
          if [ "${{ matrix.image }}" = "backend" ]; then
            echo "value=$BACKEND_IMAGE" >> "$GITHUB_OUTPUT"
          else
            echo "value=$FRONTEND_IMAGE" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: v0.72.0
      - name: Scan for high and critical vulnerabilities
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            "${{ steps.resolve.outputs.value }}" \
            > "trivy-${{ matrix.image }}.sarif" || true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}

  deploy-staging:
    name: Deploy staging
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: [docker-build, container-scan]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: staging
      url: https://staging.chaos-messenger.local
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.4

      - name: Configure kubeconfig
        id: kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_STAGING }}
        run: |
          if [ -z "$KUBECONFIG_B64" ]; then
            echo "KUBECONFIG staging secret not set — skipping deploy"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl auth can-i patch deployment -n chaos-messenger | grep -qx yes
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to staging
        if: steps.kubeconfig.outputs.ready == 'true'
        env:
          REGISTRY: ${{ env.REGISTRY }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.sha }}
        run: |
          kubectl kustomize k8s | python3 -c "
          import os, sys
          rendered = sys.stdin.read()
          for name in ('REGISTRY', 'REPOSITORY', 'TAG'):
              rendered = rendered.replace('\${' + name + '}', os.environ[name])
          sys.stdout.write(rendered)
          " > /tmp/chaos-manifests.yaml
          kubectl apply --server-side --field-manager=github-actions -f /tmp/chaos-manifests.yaml
          kubectl rollout status deployment/chaos-backend -n chaos-messenger --timeout=7m
          kubectl rollout status deployment/chaos-frontend -n chaos-messenger --timeout=5m

      - name: Smoke test staging
        run: |
          BACKEND_URL="https://staging.chaos-messenger.local"
          curl -fsS "$BACKEND_URL/actuator/health" || exit 1

  promote-production:
    name: Promote staging to production
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: production
      url: https://chaos-messenger.local
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Await manual approval
        run: echo "Waiting for operator approval to promote..."

  deploy-production:
    name: Deploy to production
    needs: [promote-production]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://chaos-messenger.local
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.4

      - name: Configure kubeconfig
        id: kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG }}
        run: |
          if [ -z "$KUBECONFIG_B64" ]; then
            echo "KUBECONFIG production secret not set — skipping deploy"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl auth can-i patch deployment -n chaos-messenger | grep -qx yes
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to production
        if: steps.kubeconfig.outputs.ready == 'true'
        env:
          REGISTRY: ${{ env.REGISTRY }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.sha }}
        run: |
          kubectl kustomize k8s | python3 -c "
          import os, sys
          rendered = sys.stdin.read()
          for name in ('REGISTRY', 'REPOSITORY', 'TAG'):
              rendered = rendered.replace('\${' + name + '}', os.environ[name])
          sys.stdout.write(rendered)
          " > /tmp/chaos-manifests.yaml
          kubectl apply --server-side --field-manager=github-actions -f /tmp/chaos-manifests.yaml
          kubectl rollout status deployment/chaos-backend -n chaos-messenger --timeout=7m
          kubectl rollout status deployment/chaos-frontend -n chaos-messenger --timeout=5m
          kubectl get pods -n chaos-messenger
