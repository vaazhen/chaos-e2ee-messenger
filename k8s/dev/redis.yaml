apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-redis
  namespace: chaos-messenger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-redis
  template:
    metadata:
      labels:
        app: chaos-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$REDIS_PASSWORD\""]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chaos-messenger-secret
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 6379
          livenessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: chaos-redis
  namespace: chaos-messenger
spec:
  selector:
    app: chaos-redis
  ports:
    - port: 6379
      targetPort: 6379
