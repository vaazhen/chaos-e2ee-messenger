apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: chaos-postgres
  namespace: chaos-messenger
spec:
  serviceName: chaos-postgres
  replicas: 1
  selector:
    matchLabels:
      app: chaos-postgres
  template:
    metadata:
      labels:
        app: chaos-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: chaos_messenger
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chaos-messenger-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "chaos_messenger"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "chaos_messenger"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: chaos-postgres
  namespace: chaos-messenger
spec:
  selector:
    app: chaos-postgres
  ports:
    - port: 5432
      targetPort: 5432
