apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: chaos-backend
  namespace: chaos-messenger
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: chaos-backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: chaos-frontend
  namespace: chaos-messenger
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: chaos-frontend
