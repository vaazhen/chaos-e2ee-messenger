apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-redis
  namespace: chaos-messenger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-redis
  template:
    metadata:
      labels:
        app: chaos-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: chaos-redis
  namespace: chaos-messenger
spec:
  selector:
    app: chaos-redis
  ports:
    - port: 6379
      targetPort: 6379
