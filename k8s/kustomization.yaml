apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: chaos-messenger

# ═══════════════════════════════════════════════════════════════════════
# PREREQUISITES (managed externally — NOT created by this kustomization):
#   - PostgreSQL 16  (set SPRING_DATASOURCE_URL/USERNAME/PASSWORD)
#   - Redis 7        (set SPRING_DATA_REDIS_HOST/PORT/PASSWORD)
#   - Kafka/Redpanda (set CHAOS_KAFKA_BOOTSTRAP_SERVERS, enable with CHAOS_KAFKA_ENABLED=true)
# ═══════════════════════════════════════════════════════════════════════

resources:
  - namespace.yaml
  - configmap.yaml
  - backend.yaml
  - frontend.yaml
  - ingress.yaml
  - autoscaling.yaml
  - disruption-budgets.yaml
