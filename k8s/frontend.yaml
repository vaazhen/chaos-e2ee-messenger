apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-frontend
  namespace: chaos-messenger
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chaos-frontend
  template:
    metadata:
      labels:
        app: chaos-frontend
    spec:
      containers:
        - name: frontend
          image: ${REGISTRY:-ghcr.io}/${REPOSITORY:-chaos-messenger}/frontend:${TAG:-latest}
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: chaos-frontend
  namespace: chaos-messenger
spec:
  selector:
    app: chaos-frontend
  ports:
    - port: 80
      targetPort: 80
