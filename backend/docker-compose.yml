version: '3.8'
services:
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./src/main/resources/grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./src/main/resources/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro
      - ./src/main/resources/chaos-messenger-dashboard.json:/var/lib/grafana/dashboards/chaos-messenger-dashboard.json:ro

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=chaos
      - POSTGRES_USER=chaos
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"


  redpanda:
    image: redpandadata/redpanda:v24.3.7
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/chaos
      - SPRING_DATASOURCE_USERNAME=chaos
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - SPRING_DATA_REDIS_HOST=redis
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - CHAOS_KAFKA_ENABLED=${CHAOS_KAFKA_ENABLED:-true}
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
    depends_on:
      - postgres
      - redis
      - redpanda

volumes:
  grafana-data:
  prometheus-data:
  redpanda-data:
  postgres-data:
