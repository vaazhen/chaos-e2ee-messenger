# Production profile
# Activate with SPRING_PROFILES_ACTIVE=prod.
#
# Required env vars:
# JWT_SECRET: random 32+ character string
# CHAOS_CORS_ALLOWED_ORIGINS: exact frontend origin, e.g. https://app.example.com
# SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD
# SPRING_DATA_REDIS_HOST / SPRING_DATA_REDIS_PORT

# Expose health, info, and prometheus metrics for Grafana
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.server.port=9091

server.error.include-message=never

# Logging level
logging.level.ru.messenger.chaosmessenger=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.messaging=WARN

# Swagger disabled in prod
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Security
chaos.security.public-docs-enabled=false
chaos.security.public-prometheus-enabled=false

# Demo mode (opt-in: set CHAOS_DEMO_ENABLED=true to enable /api/demo/seed)
chaos.demo.enabled=${CHAOS_DEMO_ENABLED:false}

# Kafka / outbox
chaos.kafka.enabled=${CHAOS_KAFKA_ENABLED:false}
chaos.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
chaos.kafka.topic.replicas=${CHAOS_KAFKA_TOPIC_REPLICAS:3}

# Reverse-proxy awareness and hardened refresh cookie
server.forward-headers-strategy=framework
chaos.auth.refresh-cookie-same-site=Strict
