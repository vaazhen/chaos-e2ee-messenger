# Production profile
# Activate with SPRING_PROFILES_ACTIVE=prod.
#
# Required env vars:
# JWT_SECRET: random 32+ character string
# CHAOS_CORS_ALLOWED_ORIGINS: exact frontend origin, e.g. https://app.example.com
# SPRING_DATASOURCE_URL / SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD
# SPRING_DATA_REDIS_HOST / SPRING_DATA_REDIS_PORT

# Expose health, info, and prometheus metrics for Grafana
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.server.port=8080

server.error.include-message=never

# Logging level
logging.level.ru.messenger.chaosmessenger=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.messaging=WARN

# Swagger disabled in prod
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Security
chaos.security.public-docs-enabled=false
chaos.security.public-prometheus-enabled=true
