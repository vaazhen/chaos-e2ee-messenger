# ── Chaos Messenger — base configuration ─────────────────────────────────────
# Profile-specific overrides live in application-dev.properties / application-prod.properties
# Active profile is set via SPRING_PROFILES_ACTIVE env var.

spring.application.name=chaos-messenger

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Server
server.address=0.0.0.0
server.port=8080

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Security & JWT
# JWT_SECRET MUST be set via environment variable - no default value intentionally.
# Generate one: openssl rand -hex 32
logging.level.org.springframework.security=INFO
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Actuator - only health + info exposed by default; prometheus enabled only in dev.
management.endpoints.web.exposure.include=health,info
management.endpoints.web.base-path=/actuator

# CORS
chaos.cors.allowed-origin-patterns=${CHAOS_CORS_ALLOWED_ORIGIN_PATTERNS:}
chaos.cors.allowed-origins=${CHAOS_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# WebSocket
spring.websocket.message-broker.simple.broadcast-period=5000
spring.websocket.message-broker.simple.relay-write-buffer-size=16384

# Attachments
chaos.attachments.storage-path=./attachments
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# Push Notifications (VAPID)
chaos.push.vapid-public-key=${VAPID_PUBLIC_KEY:}
chaos.push.vapid-private-key=${VAPID_PRIVATE_KEY:}
