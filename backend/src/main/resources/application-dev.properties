# Development profile
# Activate with SPRING_PROFILES_ACTIVE=dev.

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/chaos_messenger}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

server.error.include-message=always

logging.level.ru.messenger.chaosmessenger=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.messaging=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

chaos.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*,http://192.168.*.*:*,http://10.*.*.*:*,http://172.*.*.*:*
chaos.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
chaos.security.public-docs-enabled=true
chaos.security.public-prometheus-enabled=true

# Kafka / outbox
chaos.kafka.enabled=${CHAOS_KAFKA_ENABLED:false}
chaos.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
